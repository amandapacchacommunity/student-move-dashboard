<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chicago Student Housing Trends</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
  <header class="hero">
    <h1>Chicago Student Housing Trends</h1>
    <p>
      Synthetic dashboard showing neighborhood popularity for students moving
      off campus in Chicago.
    </p>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2>Choose Year</h2>
        <div id="controls" class="controls">
          <button data-year="2013" onclick="setYear('2013')">2013</button>
          <button data-year="2014" onclick="setYear('2014')">2014</button>
          <button data-year="2015" onclick="setYear('2015')">2015</button>
          <button data-year="2016" onclick="setYear('2016')">2016</button>
          <button data-year="2017" onclick="setYear('2017')">2017</button>
          <button data-year="all" onclick="setYear('all')">All Time</button>
        </div>
      </section>

      <section class="panel">
        <h2>Top 3 Neighborhoods</h2>
        <div id="top3"></div>
      </section>

      <section class="panel">
        <h2>Heat Legend</h2>
        <div id="legend">
          <div><span style="background:#4a1486"></span> 221+</div>
          <div><span style="background:#8e24aa"></span> 151–220</div>
          <div><span style="background:#1e88e5"></span> 91–150</div>
          <div><span style="background:#43a047"></span> 36–90</div>
          <div><span style="background:#fb8c00"></span> 1–35</div>
          <div><span style="background:#eceff1"></span> No data</div>
        </div>
      </section>

      <section class="panel">
        <h2>Status</h2>
        <div id="status">Loading dashboard data...</div>
      </section>
    </aside>

    <section class="map-panel">
      <div id="map"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
