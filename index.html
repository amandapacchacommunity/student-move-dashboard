<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chicago Student Housing Trends</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
  <header class="hero">
    <h1>Chicago Student Housing Trends</h1>
    <p>Synthetic model of where students moving off campus may concentrate across Chicago neighborhoods.</p>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>Top 3 Neighborhoods</h2>
      <div id="top3"></div>

      <div class="legend-wrap">
        <h3>Popularity Scale</h3>
        <div class="legend">
          <span class="swatch low"></span><span>Lower student movement</span>
          <span class="swatch med"></span><span>Medium</span>
          <span class="swatch high"></span><span>Higher student movement</span>
        </div>
      </div>
      <div id="controls">
        <button onclick="setYear('2013')">2013</button>
        <button onclick="setYear('2014')">2014</button>
        <button onclick="setYear('2015')">2015</button>
        <button onclick="setYear('2016')">2016</button>
        <button onclick="setYear('2017')">2017</button>
        <button onclick="setYear('all')">All Time</button>
      </div>
      
      <div id="status">Loading data…</div>
    </section>

    <section class="map-panel">
      <div id="map"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
